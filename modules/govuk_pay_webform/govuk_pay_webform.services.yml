services:
  govuk_pay_webform.payment_service:
    class: Drupal\govuk_pay_webform\GovUkPayWebformService
    arguments:
      - '@config.factory'
      - '@govuk_pay.api_service'
      - '@uuid'
      - '@request_stack'
      - '@entity_type.manager'
      - '@logger.factory'
      - '@tempstore.private'
      - '@token'
  govuk_pay_webform.access_checker:
    class: Drupal\govuk_pay_webform\Access\GovPayWebformAccess
    arguments: ['@current_user', '@tempstore.private']
    tags:
      - { name: access_check, applies_to: _govuk_pay_webform_access_check }
      - '@token'
