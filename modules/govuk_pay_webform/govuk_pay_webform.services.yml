services:
  govuk_pay_webform.payment_service:
    class: Drupal\govuk_pay_webform\GovUkPayWebformService
    arguments:
      - '@config.factory'
      - '@govuk_pay.api_service'
      - '@uuid'
      - '@request_stack'
      - '@entity_type.manager'
      - '@logger.factory'
      - '@tempstore.private'
      - '@token'
      - '@current_user'
      - '@govuk_pay.payment_event_service'
  govuk_pay_webform.access_checker:
    class: Drupal\govuk_pay_webform\Access\GovPayWebformAccess
    arguments: ['@current_user', '@tempstore.private']
    tags:
      - { name: access_check, applies_to: _govuk_pay_webform_access_check }
  govuk_pay_webform.redirect_subscriber:
    class: Drupal\govuk_pay_webform\EventSubscriber\GovUkPayRedirectSubscriber
    arguments: ['@tempstore.private', '@logger.factory']
    tags:
      - { name: event_subscriber }
  govuk_pay_webform.route_subscriber:
    class: Drupal\govuk_pay_webform\Routing\RouteSubscriber
    tags:
      - { name: event_subscriber }
  govuk_pay_webform.payment_access:
    class: Drupal\govuk_pay_webform\Access\GovPayPaymentAccess
    arguments: ['@entity_type.manager', '@tempstore.private']
    tags:
      - { name: access_check, applies_to: _govuk_payment_access_check }
