services:
  govuk_pay.client_service:
    class: Drupal\govuk_pay\PayClientService
    arguments: ['@http_client', '@config.factory', '@logger.factory']
  
  govuk_pay.api_service:
    class: Drupal\govuk_pay\ApiService
    arguments: ['@http_client', '@config.factory', '@govuk_pay.client_service', '@logger.factory']