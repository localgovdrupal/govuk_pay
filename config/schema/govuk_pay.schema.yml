# Schema for the configuration files of the GOV.UK Pay module.

govuk_pay.settings:
  type: config_object
  label: 'GOV.UK Pay settings'
  mapping:
    gov_pay__apikey:
      type: string
      label: 'GOV.UK Pay API key'
      description: 'The API key used for authenticating with the GOV.UK Pay service.'
    gov_pay__reference:
      type: string
      label: 'GOV.UK Pay reference'
      description: 'The fallback reference sent to the GOV.UK Pay service.'
    gov_pay__webhook_signing_secret:
      type: string
      label: 'GOV.UK Pay webhook signing secret'
      description: 'The signing secret used to verify webhook messages from GOV.UK Pay.'
